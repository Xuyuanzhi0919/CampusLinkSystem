server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: campuslink-backend

  # 激活本地配置 (开发环境)
  profiles:
    active: local

  # 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/campuslink?serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 155062862Xyz.
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  # JPA配置
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.campuslink.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Knife4j (Swagger)配置
knife4j:
  enable: true
  setting:
    language: zh_cn

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# JWT配置（自定义）
jwt:
  secret: your-secret-key-change-in-production-min-256-bits
  expiration: 7200
  refresh-expiration: 604800

# 微信小程序配置
# 注意: 实际密钥请配置在 application-local.yml 中 (该文件已被 .gitignore 忽略)
wechat:
  miniapp:
    appid: ${WECHAT_APPID:your-wechat-appid}
    secret: ${WECHAT_SECRET:your-wechat-secret}
    auth-url: https://api.weixin.qq.com/sns/jscode2session

# 阿里云 OSS 配置
# 注意: 实际密钥请配置在 application-local.yml 中 (该文件已被 .gitignore 忽略)
aliyun:
  oss:
    endpoint: oss-cn-hangzhou.aliyuncs.com
    access-key-id: your-access-key-id
    access-key-secret: your-access-key-secret
    bucket-name: campuslink-resources
    upload-dir: uploads/

# DeepSeek AI 配置
# 注意: API Key 请配置在 application-local.yml 中 (该文件已被 .gitignore 忽略)
deepseek:
  api:
    key: ${DEEPSEEK_API_KEY:}
    url: https://api.deepseek.com/v1/chat/completions
  model: deepseek-chat
  max-tokens: 2000
  temperature: 0.7

# 邮件配置（具体账号密码配置在 application-local.yml 中）
spring:
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:your-email@qq.com}
    password: ${MAIL_PASSWORD:your-smtp-auth-code}
    properties:
      mail:
        smtp:
          ssl:
            enable: true
          auth: true
    default-encoding: UTF-8

# 邮件验证码配置
campuslink:
  email:
    from: ${MAIL_USERNAME:your-email@qq.com}
    expire-minutes: 5       # 验证码有效期（分钟）
    max-send-per-hour: 5    # 每小时最多发送次数

# 日志配置
logging:
  level:
    root: INFO
    com.campuslink: DEBUG
    org.springframework.web: DEBUG
    org.hibernate: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
